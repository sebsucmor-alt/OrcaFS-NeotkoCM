on:
  workflow_call:
    inputs:
      cache-key:
        required: true
        type: string
      cache-path:
        required: true
        type: string
      valid-cache:
        required: true
        type: boolean
      os:
        required: true
        type: string
      arch:
        required: false
        type: string
      build-deps-only:
        required: false
        type: boolean
      force-build:
        required: false
        type: boolean

jobs:
  build_deps:
    name: Build Deps
    if: inputs.build-deps-only || inputs.force-build || inputs.valid-cache != true
    runs-on: ${{ inputs.os }}
    env:
      date:
    steps:

      # Setup the environment
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: 'true'

      - name: load cached deps
        uses: actions/cache@v4
        with:
          path: ${{ inputs.cache-path }}
          key: ${{ inputs.cache-key }}

      - uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "~3.28.0"  # use most recent 3.28.x version

      - name: setup dev on Windows
        if: inputs.os == 'windows-latest'
        uses: microsoft/setup-msbuild@v2

      - name: Get the date on Ubuntu and macOS
        if: inputs.os != 'windows-latest'
        run: echo "date=$(date +'%Y%m%d')" >> $GITHUB_ENV
        shell: bash

      - name: Get the date on Windows
        if: inputs.os == 'windows-latest'
        run: echo "date=$(Get-Date -Format 'yyyyMMdd')" | Out-File -Append -FilePath $env:GITHUB_ENV -Encoding utf8
        shell: pwsh


      # Enable long path support on Windows - required because the repo name is long
      # and OCCT/Sentry submodules create deeply nested paths that exceed Windows' 260 char limit
      - name: Enable long paths on Windows
        if: inputs.os == 'windows-latest'
        shell: pwsh
        run: |
          git config --system core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" `
            -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force

      # Build Dependencies
      - name: Build on Windows
        if: inputs.os == 'windows-latest'
        working-directory: ${{ github.workspace }}
        shell: pwsh
        run: |
          choco install strawberryperl
          .\build_release_vs2022.bat deps
          .\build_release_vs2022.bat pack
          cd "${{ github.workspace }}/deps/build"

      # FIX: Verify that OpenVDB was actually built and is findable after the Windows build.
      # Previously the build could silently succeed without OpenVDB, causing the main build to fail.
      - name: Verify OpenVDB on Windows
        if: inputs.os == 'windows-latest'
        shell: bash
        run: |
          echo "=== Searching for OpenVDB cmake files ==="
          found_cmake=$(find "${{ github.workspace }}/deps/build/OrcaSlicer_dep" -name "FindOpenVDB.cmake" -o -name "OpenVDBConfig.cmake" -o -name "openvdb-config.cmake" 2>/dev/null | head -5)
          if [ -z "$found_cmake" ]; then
            echo "::error::OpenVDB cmake files not found in deps. The dependency build may have failed silently."
            echo "=== Contents of deps/build/OrcaSlicer_dep ==="
            find "${{ github.workspace }}/deps/build/OrcaSlicer_dep" -maxdepth 3 -type d 2>/dev/null || echo "Directory not found"
            exit 1
          fi
          echo "OpenVDB cmake files found:"
          echo "$found_cmake"

          echo "=== Searching for OpenVDB headers ==="
          found_headers=$(find "${{ github.workspace }}/deps/build/OrcaSlicer_dep" -name "openvdb.h" 2>/dev/null | head -3)
          if [ -z "$found_headers" ]; then
            echo "::error::OpenVDB headers not found. The dependency build may be incomplete."
            exit 1
          fi
          echo "OpenVDB headers found:"
          echo "$found_headers"

      - name: Build on Mac ${{ inputs.arch }}
        if: inputs.os == 'macos-14'
        working-directory: ${{ github.workspace }}
        run: |
            brew install automake texinfo libtool
            brew list
            brew uninstall --ignore-dependencies zstd
            ./build_release_macos.sh -dx -a universal -t 10.15 -1
            for arch in arm64 x86_64; do
                (cd "${{ github.workspace }}/deps/build/${arch}" && \
                find . -mindepth 1 -maxdepth 1 ! -name 'OrcaSlicer_dep' -exec rm -rf {} +)
            done
            brew install zstd


      - name: Install Ubuntu Build Dependencies
        if: inputs.os == 'ubuntu-20.04' || inputs.os == 'ubuntu-24.04'
        working-directory: ${{ github.workspace }}
        env:
          apt-cmd: ${{ (inputs.os == 'ubuntu-20.04' && 'apt-fast') || (inputs.os == 'ubuntu-24.04' && 'sudo apt-get') || '' }}
          webkit-ver: ${{ (inputs.os == 'ubuntu-20.04' && '4.0') || (inputs.os == 'ubuntu-24.04' && '4.1') || '' }}
        run: |
            ${{ env.apt-cmd }} update
            ${{ env.apt-cmd }} install -y cmake git g++ build-essential libgl1-mesa-dev m4 \
            libwayland-dev libxkbcommon-dev wayland-protocols extra-cmake-modules pkgconf \
            libglu1-mesa-dev libcairo2-dev libgtk-3-dev libsoup2.4-dev libwebkit2gtk-${{ env.webkit-ver }}-dev \
            libgstreamer1.0-dev libgstreamer-plugins-good1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-bad wget sudo autoconf curl libunwind-dev texinfo

      - name: Build on Ubuntu
        if: inputs.os == 'ubuntu-20.04' || inputs.os == 'ubuntu-24.04'
        working-directory: ${{ github.workspace }}
        run: |
            mkdir -p ${{ github.workspace }}/deps/build
            mkdir -p ${{ github.workspace }}/deps/build/destdir
            sudo ./build_linux.sh -ur
            sudo chown $USER -R ./
            ./build_linux.sh -dr
            cd deps/build
            tar -czvf OrcaSlicer_dep_ubuntu_$(date +"%Y%m%d").tar.gz destdir


      # Upload Artifacts (commented out to reduce artifact storage usage)
      # - name: Upload Mac ${{ inputs.arch }} artifacts
      #   if: inputs.os == 'macos-14'
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: OrcaSlicer_dep_mac_${{ env.date }}
      #     path: ${{ github.workspace }}/deps/build/OrcaSlicer_dep*.tar.gz

      # - name: Upload Windows artifacts
      #   if: inputs.os == 'windows-latest'
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: OrcaSlicer_dep_win64_${{ env.date }}
      #     path: ${{ github.workspace }}/deps/build/OrcaSlicer_dep*.zip

      # - name: Upload Ubuntu artifacts
      #   if: ${{ ! env.ACT && inputs.os == 'ubuntu-20.04' || inputs.os == 'ubuntu-24.04' }}
      #   env:
      #     ubuntu-ver: ${{ (inputs.os == 'ubuntu-20.04' && '2004') || (inputs.os == 'ubuntu-24.04' && '2404') || '' }}
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: OrcaSlicer_dep_ubuntu_${{ env.ubuntu-ver }}_${{ env.date }}
      #     path: ${{ github.workspace }}/deps/build/OrcaSlicer_dep_ubuntu_*.tar.gz

  build_orca:
    name: Build Snapmaker_Orca
    needs: [build_deps]
    if: ${{ !cancelled() && !inputs.build-deps-only && inputs.force-build || (inputs.valid-cache == true && needs.build_deps.result == 'skipped') || (inputs.valid-cache != true && success()) }}
    uses: ./.github/workflows/build_orca.yml
    with:
      cache-key: ${{ inputs.cache-key }}
      cache-path: ${{ inputs.cache-path }}
      os: ${{ inputs.os }}
      arch: ${{ inputs.arch }}
    secrets: inherit

  upload_symbols:
    name: Upload Debug Symbols to Sentry
    needs: [build_orca]
    if: ${{ !cancelled() && needs.build_orca.result == 'success' && github.repository == 'Snapmaker/OrcaSlicer' }}
    uses: ./.github/workflows/sentry_cli.yml
    with:
      os: ${{ inputs.os }}
      pdb-artifact-name: PDB
      dsym-artifact-name: ${{ inputs.os == 'macos-14' && format('dSYM_Mac_{0}', needs.build_orca.outputs.release) || '' }}
      release: ${{ needs.build_orca.outputs.release || github.sha }}
    secrets: inherit
