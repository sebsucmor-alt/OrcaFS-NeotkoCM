name: Check Cache

on:
  workflow_call:
    inputs:
      os:
        required: true
        type: string
      arch:
        required: false
        type: string
      build-deps-only:
        required: false
        type: boolean
      force-build:
        required: false
        type: boolean
  
jobs:
  check_cache: # determines if there is a cache and outputs variables used in caching process
    name: Check Cache
    runs-on: ${{ inputs.os }}
    outputs:
      cache-key: ${{ steps.set_outputs.outputs.cache-key }}
      cache-path: ${{ steps.set_outputs.outputs.cache-path }}
      valid-cache: ${{ steps.cache_deps.outputs.cache-hit }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          lfs: 'true'
        
      - name: set outputs
        id: set_outputs
        # FIX: Use bash on all platforms to avoid mixed path separators on Windows.
        # Previously, Windows used PowerShell which caused paths like:
        #   C:\...\deps\build/OrcaSlicer_dep  (mixed separators)
        # This broke cache lookup and caused deps (including OpenVDB) to never be found.
        shell: bash
        run: |
          if [ "${{ inputs.os }}" = "windows-latest" ]; then
            dep_folder="/OrcaSlicer_dep"
          elif [ "${{ inputs.os }}" = "macos-14" ]; then
            dep_folder=""
          else
            dep_folder="/destdir"
          fi
          echo "cache-key=${{ inputs.os }}-cache-orcaslicer_deps-build-${{ hashFiles('deps/**') }}" >> "$GITHUB_OUTPUT"
          echo "cache-path=${{ github.workspace }}/deps/build${dep_folder}" >> "$GITHUB_OUTPUT"
            
      - name: load cache
        id: cache_deps
        uses: actions/cache@v4
        with:
          path: ${{ steps.set_outputs.outputs.cache-path }}
          key: ${{ steps.set_outputs.outputs.cache-key }}
          lookup-only: true
        
  build_deps: # call next step
    name: Build Deps
    needs: [check_cache]
    uses: ./.github/workflows/build_deps.yml
    with:
      cache-key: ${{ needs.check_cache.outputs.cache-key }}
      cache-path: ${{ needs.check_cache.outputs.cache-path }}
      valid-cache: ${{ needs.check_cache.outputs.valid-cache == 'true' }}
      os: ${{ inputs.os }}
      arch: ${{ inputs.arch }}
      build-deps-only: ${{ inputs.build-deps-only }}
      force-build: ${{ inputs.force-build }}
    secrets: inherit
